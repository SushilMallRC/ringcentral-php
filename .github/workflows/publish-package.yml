name: Release

on:
  push:
    tags:
      - '*'
jobs:
  Release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: [8.1, 8.0, 7.4]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Use PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: pcov
          tools: composer:v2
          ini-values: phar.readonly=0
      - name: Composer update
        run: composer update
      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction
      - name: Run tests
        run: composer test
      - name: Build phar
        run: composer phar
      - name: Extract tag name
        id: get_tag
        run: |
         TAG=${GITHUB_REF#refs/tags/}
         echo "TAG=$TAG" >> $GITHUB_ENV
      - name: Publish to Packagist
        if: matrix.php-version == '7.4'
        env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
         PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
         TAG=${{ env.TAG }}
         curl -X POST \
          -H "Authorization: token $PACKAGIST_TOKEN" \
          https://packagist.org/api/update-package?username=SushilMallRC&apiToken=$PACKAGIST_TOKEN \
          -d '{"repository":{"url":"https://github.com/SushilMallRC/ringcentral-php","version":"'$TAG'"}}' 
